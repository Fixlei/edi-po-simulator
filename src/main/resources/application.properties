# ==============================================================
# EDI PO Simulator - Application Configuration
# ==============================================================

# --- Server ---
server.port=8080

# --- H2 In-Memory Database ---
# (No installation needed; database lives in JVM memory and is recreated on restart)
spring.datasource.url=jdbc:h2:mem:edidb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
# create-drop: schema is rebuilt every time the app starts (good for dev)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- H2 Web Console ---
# Visit http://localhost:8080/h2-console after the app starts
# JDBC URL: jdbc:h2:mem:edidb   user: sa   password: (leave empty)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- EDI Output ---
# Where generated .edi files will be written
edi.output.directory=./output

# --- Logging ---
logging.level.com.example.edisimulator=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%logger{0}] - %msg%n